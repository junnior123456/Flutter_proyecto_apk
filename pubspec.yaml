name: prototipe1
description: "A new Flutter project."

publish_to: 'none' # Prevent accidental publishing to pub.dev

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  # 📱 Iconos iOS
  cupertino_icons: ^1.0.8

  # 🧠 Gestión de estado
  flutter_bloc: ^9.1.1
  equatable: ^2.0.7

  # 💾 Preferencias locales
  shared_preferences: ^2.2.3

  # 🌐 Conexión HTTP (para backend NestJS)
  http: ^1.2.2

  # 🖼️ Imágenes (galería/cámara y caché)
  image_picker: ^1.1.2
  cached_network_image: ^3.3.1

  # 🔥 Firebase
  firebase_core: ^3.6.0
  firebase_storage: ^12.3.2
  firebase_auth: ^5.3.1

  # 🔐 Autenticación con Google
  google_sign_in: ^6.2.1

  # 📧 Email y URL launcher
  url_launcher: ^6.3.0
  mailer: ^6.1.2

  # 🔳 Código QR del expediente (Módulo 3)
  qr_flutter: ^4.1.0
  
  # 🍞 Toast messages
  fluttertoast: ^8.2.8

  # 🎨 Gestión de temas y colores
  flex_color_scheme: ^8.0.2
  
  # 📁 Manejo de archivos
  path_provider: ^2.1.4
  
  # 🖼️ Procesamiento de imágenes
  image: ^4.2.0
  
  # 🔐 Permisos
  permission_handler: ^11.3.1
  file_picker: ^11.0.2
  open_filex: ^4.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  # 🧹 Buenas prácticas y linting
  flutter_lints: ^5.0.0

  # 🐾 Generador del icono de la app (huella de PawFinder)
  flutter_launcher_icons: ^0.14.1

# 🐾 Icono de la app: se genera con `dart run flutter_launcher_icons`
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/pawfinder_icon.png"
  adaptive_icon_background: "#FF9800"
  adaptive_icon_foreground: "assets/icon/pawfinder_fg.png"
  remove_alpha_ios: true
  web:
    generate: true
    image_path: "assets/icon/pawfinder_icon.png"
    background_color: "#FF9800"
    theme_color: "#FF9800"

flutter:
  uses-material-design: true

  # Imágenes y assets de la app
  assets:
    - assets/images/
    - assets/icon/
  #
  # Si usas fuentes personalizadas, configúralas así:
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
